name: Action - Install pnpm - setup node - install deps

inputs:
  READER_TOKEN:
    required: true
    description: npm reader token

runs:
  using: composite
  steps:
    - name: Install pnpm
      uses: pnpm/action-setup@v4
      with:
        version: 11.1.2+sha512.415a1cc25974731e75455c1468371be74c5aa5fb7621b50d4056d222451609f11412f23fd602e6169f1e060466641f798597e1be961a10688836a67b16569499
    - uses: actions/setup-node@v5
      with:
        node-version: 25
        registry-url: "https://npm.pkg.github.com"
        cache: 'pnpm'
    - name: Install dependencies
      shell: bash
      run: pnpm install --frozen-lockfile --ignore-scripts
      env:
        NODE_AUTH_TOKEN: ${{ inputs.READER_TOKEN }}
